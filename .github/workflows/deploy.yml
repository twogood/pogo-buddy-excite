name: Deploy to Bunny.net

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bunny CLI
        run: |
          npm install --global @bunny.net/cli@0.5.1
          bunny --version

      - name: Verify Bunny auth
        env:
          BUNNYNET_API_KEY: ${{ secrets.BUNNY_API_KEY }}
        run: bunny whoami --output json > /dev/null

      - name: Find or create storage zone
        id: storage
        env:
          BUNNYNET_API_KEY: ${{ secrets.BUNNY_API_KEY }}
        run: |
          ZONE_NAME="pogo-buddy-excite"

          ALL_ZONES=$(bunny api GET '/storagezone?page=1&perPage=1000' --output json)
          EXISTING=$(echo "$ALL_ZONES" | jq -c '(.Items // [])[] | select(.Name == "pogo-buddy-excite")' | head -1)

          if [ -n "$EXISTING" ]; then
            SZ_ID=$(echo "$EXISTING" | jq -r '.Id')
            SZ_PASSWORD=$(echo "$EXISTING" | jq -r '.Password')
            SZ_HOST=$(echo "$EXISTING" | jq -r '.StorageHostname')
          else
            RESPONSE=$(bunny api POST /storagezone \
              --body '{"Name":"pogo-buddy-excite","Region":"SE"}' \
              --output json)
            SZ_ID=$(echo "$RESPONSE" | jq -r '.Id')
            SZ_PASSWORD=$(echo "$RESPONSE" | jq -r '.Password')
            SZ_HOST=$(echo "$RESPONSE" | jq -r '.StorageHostname')
            sleep 5
          fi

          echo "::add-mask::$SZ_PASSWORD"
          echo "id=$SZ_ID" >> $GITHUB_OUTPUT
          echo "password=$SZ_PASSWORD" >> $GITHUB_OUTPUT
          echo "host=$SZ_HOST" >> $GITHUB_OUTPUT

      - name: Upload files
        env:
          SZ_PASSWORD: ${{ steps.storage.outputs.password }}
          SZ_HOST: ${{ steps.storage.outputs.host }}
        run: |
          find public -type f | while read -r file; do
            remote="${file#public/}"
            echo "Uploading $file -> /pogo-buddy-excite/$remote"
            curl --fail --silent --show-error \
              --request PUT \
              --header "AccessKey: $SZ_PASSWORD" \
              --data-binary "@$file" \
              "https://$SZ_HOST/pogo-buddy-excite/$remote"
          done

      - name: Find or create pull zone
        id: pullzone
        env:
          BUNNYNET_API_KEY: ${{ secrets.BUNNY_API_KEY }}
          SZ_ID: ${{ steps.storage.outputs.id }}
        run: |
          ALL_PZ=$(bunny api GET '/pullzone?page=1&perPage=1000' --output json)
          EXISTING_ID=$(echo "$ALL_PZ" | jq -r '(.Items // [])[] | select(.Name == "pogo-buddy-excite") | .Id' | head -1)

          if [ -z "$EXISTING_ID" ] || [ "$EXISTING_ID" = "null" ]; then
            RESPONSE=$(bunny api POST /pullzone \
              --body "{\"Name\":\"pogo-buddy-excite\",\"Type\":0,\"StorageZoneId\":$SZ_ID}" \
              --output json)
            EXISTING_ID=$(echo "$RESPONSE" | jq -r '.Id')
          fi

          echo "id=$EXISTING_ID" >> $GITHUB_OUTPUT

      - name: Add custom hostname to pull zone
        env:
          BUNNYNET_API_KEY: ${{ secrets.BUNNY_API_KEY }}
        run: |
          PZ_ID="${{ steps.pullzone.outputs.id }}"
          HOSTNAME="excite.2good.nu"

          PZ_DATA=$(bunny api GET /pullzone/$PZ_ID --output json)
          EXISTING=$(echo "$PZ_DATA" | jq -r '.Hostnames[]?.Value // empty' | grep -Fx "$HOSTNAME" || true)

          if [ -z "$EXISTING" ]; then
            bunny api POST /pullzone/$PZ_ID/addHostname \
              --body "{\"Hostname\":\"$HOSTNAME\"}" \
              --output json > /dev/null
            echo "Added hostname $HOSTNAME"
          else
            echo "Hostname $HOSTNAME already configured"
          fi

      - name: Purge pull zone cache
        env:
          BUNNYNET_API_KEY: ${{ secrets.BUNNY_API_KEY }}
        run: bunny api POST /pullzone/${{ steps.pullzone.outputs.id }}/purgeCache

  preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    env:
      PREVIEW_ZONE: pogo-buddy-excite-pr-${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Bunny CLI
        run: |
          npm install --global @bunny.net/cli@0.5.1
          bunny --version

      - name: Verify Bunny auth
        env:
          BUNNYNET_API_KEY: ${{ secrets.BUNNY_API_KEY }}
        run: bunny whoami --output json > /dev/null

      - name: Find or create storage zone
        id: storage
        env:
          BUNNYNET_API_KEY: ${{ secrets.BUNNY_API_KEY }}
          ZONE_NAME: ${{ env.PREVIEW_ZONE }}
        run: |
          ALL_ZONES=$(bunny api GET '/storagezone?page=1&perPage=1000' --output json)
          EXISTING=$(echo "$ALL_ZONES" | jq -c --arg name "$ZONE_NAME" '(.Items // [])[] | select(.Name == $name)' | head -1)

          if [ -n "$EXISTING" ]; then
            SZ_ID=$(echo "$EXISTING" | jq -r '.Id')
            SZ_PASSWORD=$(echo "$EXISTING" | jq -r '.Password')
            SZ_HOST=$(echo "$EXISTING" | jq -r '.StorageHostname')
          else
            RESPONSE=$(bunny api POST /storagezone \
              --body "{\"Name\":\"$ZONE_NAME\",\"Region\":\"SE\"}" \
              --output json)
            SZ_ID=$(echo "$RESPONSE" | jq -r '.Id')
            SZ_PASSWORD=$(echo "$RESPONSE" | jq -r '.Password')
            SZ_HOST=$(echo "$RESPONSE" | jq -r '.StorageHostname')
            sleep 5
          fi

          echo "::add-mask::$SZ_PASSWORD"
          echo "id=$SZ_ID" >> $GITHUB_OUTPUT
          echo "password=$SZ_PASSWORD" >> $GITHUB_OUTPUT
          echo "host=$SZ_HOST" >> $GITHUB_OUTPUT

      - name: Upload files
        env:
          SZ_PASSWORD: ${{ steps.storage.outputs.password }}
          SZ_HOST: ${{ steps.storage.outputs.host }}
          ZONE_NAME: ${{ env.PREVIEW_ZONE }}
        run: |
          find public -type f | while read -r file; do
            remote="${file#public/}"
            echo "Uploading $file -> /$ZONE_NAME/$remote"
            curl --fail --silent --show-error \
              --request PUT \
              --header "AccessKey: $SZ_PASSWORD" \
              --data-binary "@$file" \
              "https://$SZ_HOST/$ZONE_NAME/$remote"
          done

      - name: Find or create pull zone
        id: pullzone
        env:
          BUNNYNET_API_KEY: ${{ secrets.BUNNY_API_KEY }}
          SZ_ID: ${{ steps.storage.outputs.id }}
          ZONE_NAME: ${{ env.PREVIEW_ZONE }}
        run: |
          ALL_PZ=$(bunny api GET '/pullzone?page=1&perPage=1000' --output json)
          EXISTING_ID=$(echo "$ALL_PZ" | jq -r --arg name "$ZONE_NAME" '(.Items // [])[] | select(.Name == $name) | .Id' | head -1)

          if [ -z "$EXISTING_ID" ] || [ "$EXISTING_ID" = "null" ]; then
            RESPONSE=$(bunny api POST /pullzone \
              --body "{\"Name\":\"$ZONE_NAME\",\"Type\":0,\"StorageZoneId\":$SZ_ID}" \
              --output json)
            EXISTING_ID=$(echo "$RESPONSE" | jq -r '.Id')
          fi

          echo "id=$EXISTING_ID" >> $GITHUB_OUTPUT

      - name: Purge pull zone cache
        env:
          BUNNYNET_API_KEY: ${{ secrets.BUNNY_API_KEY }}
        run: bunny api POST /pullzone/${{ steps.pullzone.outputs.id }}/purgeCache

      - name: Post or update preview comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREVIEW_URL="https://${{ env.PREVIEW_ZONE }}.b-cdn.net"
          BODY=$(cat <<EOF
          <!-- bunny-preview -->
          **Preview:** $PREVIEW_URL

          Commit: \`${{ github.sha }}\`
          EOF
          )

          COMMENT_ID=$(gh api \
            "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.body | contains("<!-- bunny-preview -->")) | .id' | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" \
              -X PATCH -f body="$BODY"
          else
            gh pr comment ${{ github.event.pull_request.number }} --body "$BODY"
          fi

  cleanup:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    env:
      PREVIEW_ZONE: pogo-buddy-excite-pr-${{ github.event.pull_request.number }}
    steps:
      - name: Install Bunny CLI
        run: npm install --global @bunny.net/cli@0.5.1

      - name: Verify Bunny auth
        env:
          BUNNYNET_API_KEY: ${{ secrets.BUNNY_API_KEY }}
        run: bunny whoami --output json > /dev/null

      - name: Delete pull zone
        env:
          BUNNYNET_API_KEY: ${{ secrets.BUNNY_API_KEY }}
          ZONE_NAME: ${{ env.PREVIEW_ZONE }}
        run: |
          ALL_PZ=$(bunny api GET '/pullzone?page=1&perPage=1000' --output json)
          PZ_ID=$(echo "$ALL_PZ" | jq -r --arg name "$ZONE_NAME" '(.Items // [])[] | select(.Name == $name) | .Id' | head -1)

          if [ -n "$PZ_ID" ] && [ "$PZ_ID" != "null" ]; then
            bunny api DELETE /pullzone/$PZ_ID
            echo "Deleted pull zone $PZ_ID ($ZONE_NAME)"
          else
            echo "No pull zone found for $ZONE_NAME, skipping"
          fi

      - name: Delete storage zone
        env:
          BUNNYNET_API_KEY: ${{ secrets.BUNNY_API_KEY }}
          ZONE_NAME: ${{ env.PREVIEW_ZONE }}
        run: |
          ALL_ZONES=$(bunny api GET '/storagezone?page=1&perPage=1000' --output json)
          SZ_ID=$(echo "$ALL_ZONES" | jq -r --arg name "$ZONE_NAME" '(.Items // [])[] | select(.Name == $name) | .Id' | head -1)

          if [ -n "$SZ_ID" ] && [ "$SZ_ID" != "null" ]; then
            bunny api DELETE /storagezone/$SZ_ID
            echo "Deleted storage zone $SZ_ID ($ZONE_NAME)"
          else
            echo "No storage zone found for $ZONE_NAME, skipping"
          fi
